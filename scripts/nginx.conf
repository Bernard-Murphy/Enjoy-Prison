# EP Games – nginx reverse proxy for web app (HTTP + GraphQL WebSocket)
# Upstreams: web app (Next.js custom server) on 3000; optional game/search on 4001/4002.

upstream web {
    server 127.0.0.1:3000;
    keepalive 64;
}

# Optional: use if you proxy game-service or search-service through nginx
# upstream game_service {
#     server 127.0.0.1:4001;
#     keepalive 8;
# }
# upstream search_service {
#     server 127.0.0.1:4002;
#     keepalive 8;
# }

server {
    listen 80;
    listen [::]:80;
    server_name _;

    client_max_body_size 10M;

    # Next.js + GraphQL API + static assets
    location / {
        proxy_pass http://web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # GraphQL over WebSocket (subscriptions) – same origin as API, upgrade only for this path
    location /api/graphql {
        proxy_pass http://web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Sec-WebSocket-Key $http_sec_websocket_key;
        proxy_set_header Sec-WebSocket-Version $http_sec_websocket_version;
        proxy_read_timeout 86400;
    }
}

